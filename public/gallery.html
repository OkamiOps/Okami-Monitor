<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #111; color: white; font-family: sans-serif; }
  .grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .item { text-align: center; border: 1px solid #333; padding: 10px; border-radius: 4px; }
  img { image-rendering: pixelated; transform: scale(2); margin: 20px; }
</style>
</head>
<body>
<h1>Asset Gallery</h1>
<div class="grid" id="grid"></div>
<script>
  const grid = document.getElementById('grid');
  for (let i = 1; i <= 339; i++) {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<img src="/modern-office/singles/${i}.png" onerror="this.parentElement.style.display='none'"><br>#${i}`;
    grid.appendChild(div);
  }
</script>
</body>
</html>
